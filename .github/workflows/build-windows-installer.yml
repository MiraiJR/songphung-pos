name: Build Windows Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            label: x64
          - target: i686-pc-windows-msvc
            label: x86

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Tên file installer lấy theo version trong tauri.conf.json / Cargo.toml — đồng bộ với tag (v1.0.4 → 1.0.4).
      - name: Set version from git tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          echo "Release VERSION=$VERSION"
          export VERSION
          node scripts/sync-version.mjs

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      # Tauri v2: pass flags directly to CLI (no -- before --target).
      - name: Build Tauri installers (NSIS + MSI, ${{ matrix.label }})
        run: bun run tauri build --target ${{ matrix.target }} --bundles nsis,msi

      - name: Upload NSIS installer artifact (${{ matrix.label }})
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-nsis-${{ matrix.label }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload MSI installer artifact (${{ matrix.label }})
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-msi-${{ matrix.label }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload installers to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
